# ============================================================================
# docker-compose.yml — medicamentos (Next.js + PostgreSQL + pgvector)
# ============================================================================
# Segurança: sem defaults de senha, container non-root, read-only, resource limits
# ============================================================================

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: medicamentos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Defina DB_PASSWORD no .env}
      POSTGRES_DB: medicamentos
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - medicamentos-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d medicamentos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/postgresql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medicamentos-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:11006:11006"
    environment:
      DB_PASSWORD: ${DB_PASSWORD:?}
      DATABASE_URL: "postgresql://admin:${DB_PASSWORD:?}@db:5432/medicamentos"
      AUTH_SECRET: ${AUTH_SECRET:?Defina AUTH_SECRET no .env (openssl rand -base64 32)}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@unificando.com.br}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Defina ADMIN_PASSWORD no .env}
      NODE_ENV: production
      PORT: 11006
      NEXT_TELEMETRY_DISABLED: "1"
    networks:
      - medicamentos-net
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - transformers_cache:/tmp/.transformers-cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11006/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
    user: "1001:1001"

networks:
  medicamentos-net:
    driver: bridge

volumes:
  pgdata:
    driver: local
  transformers_cache:
    driver: local
