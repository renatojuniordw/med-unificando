services:
  db:
    image: postgres:16-alpine
    container_name: medicamentos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: medicamentos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - medicamentos-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d medicamentos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/postgresql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medicamentos-app
    restart: unless-stopped
    ports:
      - "11006:11006"
    environment:
      DATABASE_URL: "postgresql://admin:admin123@db:5432/medicamentos"
      AUTH_SECRET: "${AUTH_SECRET:-4EscTdx3YoQfMAErUxtmH2xyxsMGMR249oNCF+LiY3k=}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@unificando.com.br}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin123}"
      NODE_ENV: production
      PORT: 11006
      NEXT_TELEMETRY_DISABLED: "1"
    networks:
      - medicamentos-net
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11006/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
    user: "1001:1001"

networks:
  medicamentos-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  pgdata:
    driver: local
