# ============================================================================
# docker-compose.yml — medicamentos (Next.js + PostgreSQL + pgvector)
# ============================================================================
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: medicamentos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-medicamentos}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-medicamentos}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medicamentos-app
    restart: unless-stopped
    ports:
      - "11006:11006"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://admin:admin123@db:5432/medicamentos}
      AUTH_SECRET: ${AUTH_SECRET:-88kv2M3bv2IC33Kwj84tASwB9y6NL4j1dbqLSaR8xcI=}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@unificando.com.br}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Mudar@123!}
      NODE_ENV: production
      # Desabilitar SSL do ANVISA (certificado expirado)
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - transformers-cache:/tmp/.transformers-cache

volumes:
  pgdata:
  transformers-cache:
